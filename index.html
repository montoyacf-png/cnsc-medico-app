  <div class="card">

const STORE_KEY = "cnsc_v8_state";
let state = {
  selectedDay: 1,
  session: [],
  idx: 0,
  answers: {},
  mistakes: [],
  currentTitle: ""
};

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
function loadState() {
  const raw = localStorage.getItem(STORE_KEY);
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
}
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function byId(id) { return document.getElementById(id); }
function buildDaySelect() {
  const sel = byId("daySelect");
  sel.innerHTML = "";
  for (let d=1; d<=30; d++) {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = `Día ${d} · ${PLAN[d][0]}`;
    if (Number(state.selectedDay) === d) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = (e) => {
    state.selectedDay = Number(e.target.value);
    saveState();
    renderDayInfo();
  };
}
function questionsForDay(day) {
  if (day === 28 || day === 29) return shuffle(BANK).slice(0, 120);
  if (day === 30) return BANK.filter(q => state.mistakes.includes(q.id));
  return BANK.filter(q => q.day === day);
}
function renderDayInfo() {
  const d = Number(state.selectedDay);
  const qs = questionsForDay(d);
  const box = byId("dayInfo");
  box.innerHTML = "";
  [`Tema: ${PLAN[d][0]}`, `Categoría: ${PLAN[d][1]}`, `Preguntas: ${qs.length}`].forEach(t => {
    const el = document.createElement("div");
    el.className = "chip";
    el.textContent = t;
    box.appendChild(el);
  });
}
function renderStats() {
  const total = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter(v => v.correct).length;
  const acc = total ? Math.round(correct*100/total) : 0;
  const chips = byId("statsChips");
  chips.innerHTML = "";
  [
    `Respondidas: ${total}`,
    `Acierto global: ${acc}%`,
    `Errores pendientes: ${state.mistakes.length}`,
    `Banco: 396`
  ].forEach(t => {
    const el = document.createElement("div");
    el.className = "chip";
    el.textContent = t;
    chips.appendChild(el);
  });
}
function startSession(list, title) {
  state.session = list;
  state.idx = 0;
  state.currentTitle = title;
  saveState();
  renderQuiz();
}
function startDay() {
  const d = Number(state.selectedDay);
  startSession(questionsForDay(d), `Día ${d} · ${PLAN[d][0]}`);
}
function startSim() {
  startSession(shuffle(BANK).slice(0,120), "Simulacro 120");
}
function startMistakes() {
  const m = BANK.filter(q => state.mistakes.includes(q.id));
  startSession(m.length ? m : shuffle(BANK).slice(0,20), m.length ? "Repaso de errores" : "Repaso inicial 20");
}
function startQuick() {
  startSession(shuffle(BANK).slice(0,20), "Práctica rápida 20");
}
function renderQuiz() {
  const card = byId("quizCard");
  const footer = byId("footerNav");
  if (!state.session || !state.session.length) {
    card.classList.add("hidden");
    footer.style.display = "none";
    renderStats();
    return;
  }
  card.classList.remove("hidden");
  footer.style.display = "block";
  const q = state.session[state.idx];
  const answered = state.answers[q.id];
  byId("sessionTitle").textContent = state.currentTitle || "Sesión";
  byId("meta").textContent = `${q.category} · Fuente base: ${q.source}`;
  byId("bar").style.width = `${((state.idx+1)/state.session.length)*100}%`;
  byId("counter").textContent = `Pregunta ${state.idx+1} de ${state.session.length}`;
  byId("qText").textContent = q.question;
  const opts = byId("opts");
  opts.innerHTML = "";
  q.options.forEach((opt, i) => {
    const b = document.createElement("button");
    b.className = "option";
    b.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> ${opt}`;
    b.onclick = () => answer(q, i);
    if (answered) {
      b.disabled = true;
      if (i === q.answer) b.classList.add("correct");
      if (i === answered.selected && i !== q.answer) b.classList.add("wrong");
    }
    opts.appendChild(b);
  });
  byId("exp").innerHTML = answered
    ? `<strong>${answered.correct ? "Correcta" : "Incorrecta"}.</strong> ${q.explanation}<br><span class="small">Respuesta correcta: ${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</span>`
    : "";
  renderStats();
}
function answer(q, selected) {
  if (state.answers[q.id]) return;
  const correct = selected === q.answer;
  state.answers[q.id] = { selected, correct };
  if (!correct && !state.mistakes.includes(q.id)) state.mistakes.push(q.id);
  if (correct && state.mistakes.includes(q.id)) {
    state.mistakes = state.mistakes.filter(x => x !== q.id);
  }
  saveState();
  renderQuiz();
}
function nextQ() {
  if (state.idx < state.session.length - 1) {
    state.idx++;
    saveState();
    renderQuiz();
  }
}
function prevQ() {
  if (state.idx > 0) {
    state.idx--;
    saveState();
    renderQuiz();
  }
}
loadState();
buildDaySelect();
renderDayInfo();
renderStats();
renderQuiz();
</script>
