let set=[]
let i=0
let correct=0

function practice(){set=[...BANK];start()}

function exam(){set=[...BANK].sort(()=>0.5-Math.random()).slice(0,120);start()}

function start(){i=0;correct=0;document.getElementById("quiz").style.display="block";show()}

function show(){
let q=set[i]
document.getElementById("stats").innerHTML="Pregunta "+(i+1)+" de "+set.length+" | Aciertos: "+correct
document.getElementById("q").innerHTML="<h3>"+q.question+"</h3>"
let html=""
q.options.forEach((o,x)=>{html+=`<div class="option" onclick="ans(${x})">${String.fromCharCode(65+x)}. ${o}</div>`})
document.getElementById("opts").innerHTML=html
document.getElementById("exp").innerHTML=""
}

function ans(x){
let q=set[i]
let opts=document.querySelectorAll(".option")
opts.forEach(o=>o.style.pointerEvents="none")

if(x==q.answer){opts[x].classList.add("correct");correct++;}
else{opts[x].classList.add("wrong");opts[q.answer].classList.add("correct");}

document.getElementById("exp").innerHTML="<p><b>Explicación:</b> "+q.exp+"</p>"

setTimeout(()=>{i++; if(i<set.length)show(); else finish()},900)
}

function finish(){document.getElementById("quiz").innerHTML="<h2>Resultado</h2><p>"+correct+" / "+set.length+"</p>"}
